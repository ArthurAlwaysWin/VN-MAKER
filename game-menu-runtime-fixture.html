<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Galgame Maker - Game Menu Runtime Fixture</title>
  <style>
    :root { color-scheme: dark; background: #101318; }
    html, body, #app { width: 100%; height: 100%; margin: 0; }
    body { font-family: Inter, system-ui, sans-serif; color: #f4f7fb; }
    #app { position: relative; overflow: hidden; background: linear-gradient(135deg, #1d2533, #101318); }
    #ui-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    #game-menu { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    #game-menu.hidden { display: none; }
    #game-menu.visible { display: flex; }
    [data-gm-ui-renderer="shared"] { width: 100%; height: 100%; }
    [data-gm-ui-node-type="stack"] { display: grid; align-content: center; justify-items: center; }
    [data-gm-ui-node-type="button"] { border: 0; min-height: 38px; cursor: pointer; }
    pre { position: fixed; right: 8px; bottom: 8px; max-width: 360px; max-height: 140px; overflow: auto; margin: 0; padding: 8px; color: #c9d8ff; background: rgba(0,0,0,0.72); font-size: 11px; }
  </style>
</head>
<body>
  <div id="app"><div id="ui-overlay"></div></div>
  <script type="module" src="/src/ui/gameMenuRuntimeBrowserFixture.js"></script>
</body>
</html>
