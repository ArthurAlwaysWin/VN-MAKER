<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gameplay UI Runtime Fixture</title>
  <link rel="stylesheet" href="/src/style.css" />
  <style>
    body { margin: 0; background: #0a1020; color: #fff; font-family: system-ui, sans-serif; }
    #fixture-controls { position: fixed; z-index: 1000; top: 8px; left: 8px; right: 8px; display: flex; flex-wrap: wrap; gap: 6px; pointer-events: auto; }
    #fixture-controls button { padding: 5px 8px; }
    #fixture-evidence { position: fixed; z-index: 1000; right: 8px; top: 48px; width: 320px; max-height: 128px; overflow: auto; margin: 0; padding: 8px; background: rgba(0,0,0,.72); font-size: 11px; pointer-events: none; }
    #game-container { margin: 0 auto; max-width: 100vw; max-height: 100vh; background: linear-gradient(160deg,#18284b,#40264d); }
    #stage-fixture-label { position: absolute; inset: 18% auto auto 8%; font-size: clamp(24px,5vw,64px); color: rgba(255,255,255,.28); }
  </style>
</head>
<body>
  <div id="fixture-controls" aria-label="Gameplay fixture controls"></div>
  <pre id="fixture-evidence" data-test="gameplay-evidence"></pre>
  <div id="game-container">
    <div id="stage-layer"><div id="stage-fixture-label">PAGE EDITOR STORY STAGE</div><div id="background-layer"></div><div id="character-layer"></div></div>
    <div id="dialogue-layer"></div>
    <div id="ui-overlay"></div>
  </div>
  <script type="module" src="/src/ui/gameplayRuntimeBrowserFixture.js"></script>
</body>
</html>
