  <path d="M160,248 L200,290 L240,248" fill="white" stroke="#DDD" stroke-width="1"/>
  <!-- Ribbon -->
  <path d="M190,270 L200,290 L210,270 L205,275 L200,265 L195,275 Z" fill="#E05050"/>
  <!-- Skirt -->
  <path d="M130,500 L110,660 L290,660 L270,500" fill="#3A4A7A"/>
  <line x1="150" y1="500" x2="140" y2="660" stroke="#2C3E6B" stroke-width="1" opacity="0.5"/>
  <line x1="190" y1="500" x2="185" y2="660" stroke="#2C3E6B" stroke-width="1" opacity="0.5"/>
  <line x1="230" y1="500" x2="225" y2="660" stroke="#2C3E6B" stroke-width="1" opacity="0.5"/>
