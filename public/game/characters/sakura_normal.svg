  <ellipse cx="230" cy="170" rx="15" ry="18" fill="#4A90D9"/>
  <circle cx="165" cy="164" r="5" fill="white" opacity="0.8"/>
  <circle cx="225" cy="164" r="5" fill="white" opacity="0.8"/>
