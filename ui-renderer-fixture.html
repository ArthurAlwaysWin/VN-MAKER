<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Galgame Maker — Shared UI Renderer Fixture</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; background: #090e1a; color: #f5f2ff; }
    body { margin: 0; padding: 24px; }
    header { max-width: 1120px; margin: 0 auto 18px; }
    h1 { margin: 0 0 6px; font-size: 22px; }
    p { margin: 0; color: #aeb9d5; }
    main { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; max-width: 1120px; margin: 0 auto; }
    section { min-width: 0; }
    h2 { font-size: 14px; letter-spacing: .08em; text-transform: uppercase; color: #bdc9e6; }
    .stage { aspect-ratio: 16 / 9; overflow: hidden; border: 1px solid #354363; border-radius: 14px; background: #11182c; box-shadow: 0 18px 45px #0008; }
    output { display: block; max-width: 1120px; min-height: 24px; margin: 18px auto 0; padding: 12px 14px; border-radius: 10px; background: #11182c; color: #cdd7ee; }
    [data-gm-ui-node-type="text"] { margin: 0; text-align: center; }
    [data-gm-ui-semantic-widget] { border: 1px dashed #66759a; border-radius: 10px; padding: 10px; box-sizing: border-box; }
    @media (max-width: 820px) { main { grid-template-columns: 1fr; } body { padding: 14px; } }
  </style>
</head>
<body>
  <header><h1>Shared Renderer Browser Fixture</h1><p>One canonical document, one renderer, runtime and preview host policies.</p></header>
  <main>
    <section><h2>Runtime host</h2><div id="runtime-host" class="stage"></div></section>
    <section><h2>Preview host</h2><div id="preview-host" class="stage"></div></section>
  </main>
  <output id="fixture-status" aria-live="polite">Ready. Select a node or exercise an action.</output>
  <script type="module" src="/src/ui/renderer/uiRendererBrowserFixture.js"></script>
</body>
</html>
